# config.yaml
#
# Point your MCP client (Claude Desktop, Claude Code, Cursor, etc.) at
# `magus-gateway` instead of the real server directly. The gateway spawns
# the real server itself (below) and only forwards what it approves.
#
# This tool list and every hash below came from a real run against the real
# package (`npx -y @modelcontextprotocol/server-filesystem`), captured by the
# gateway's own startup log, not typed from memory. move_file's pin below is
# deliberately wrong by one character, on purpose, left in so that on your
# first run you SEE the mismatch warning fire for real instead of taking the
# hash-pinning feature on faith. Fix it once you've watched it catch it.

downstream_servers:
  - server_id: "local-filesystem"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp/magus-demo"]
    source_grade: "Known"

tools:
  - mcp_server_id: "local-filesystem"
    tool_name: "read_file"
    risk_class: "Low"
    authority_source: "User"
    pinned_definition_hash_hex: "bdc561725bb43b07798d52081b4b0be84ecfc6fa1240145a0d7e8ec6a8570df6"

